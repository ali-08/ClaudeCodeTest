<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; color: #eee;
    flex-direction: column; gap: 24px;
  }
  h1 { font-size: 2rem; letter-spacing: 2px; }
  #status { font-size: 1.2rem; min-height: 1.5em; }
  #board {
    display: grid; grid-template-columns: repeat(3, 120px); grid-template-rows: repeat(3, 120px);
    gap: 6px;
  }
  .cell {
    background: #16213e; border: none; border-radius: 8px;
    font-size: 3rem; color: #eee; cursor: pointer;
    transition: background 0.15s;
  }
  .cell:hover { background: #0f3460; }
  .cell.x { color: #e94560; }
  .cell.o { color: #00b4d8; }
  .cell.win { background: #0f3460; animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { to { background: #1a5276; } }
  #restart {
    padding: 10px 28px; font-size: 1rem; border: 2px solid #e94560;
    background: transparent; color: #e94560; border-radius: 6px;
    cursor: pointer; transition: background 0.2s;
  }
  #restart:hover { background: #e94560; color: #fff; }
  #score { display: flex; gap: 32px; font-size: 1.1rem; }
  #score span { opacity: 0.8; }
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="score">
  <span>X: <strong id="sx">0</strong></span>
  <span>O: <strong id="so">0</strong></span>
  <span>Draw: <strong id="sd">0</strong></span>
</div>
<div id="status">X's turn</div>
<div id="board"></div>
<button id="restart">New Game</button>

<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
const restartBtn = document.getElementById('restart');
let cells, state, current, gameOver;
const score = { x: 0, o: 0, d: 0 };
const wins = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function init() {
  board.innerHTML = '';
  state = Array(9).fill('');
  current = 'X';
  gameOver = false;
  status.textContent = "X's turn";
  cells = [];
  for (let i = 0; i < 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'cell';
    btn.addEventListener('click', () => play(i));
    board.appendChild(btn);
    cells.push(btn);
  }
}

function play(i) {
  if (gameOver || state[i]) return;
  state[i] = current;
  cells[i].textContent = current;
  cells[i].classList.add(current.toLowerCase());

  const winLine = wins.find(w => w.every(j => state[j] === current));
  if (winLine) {
    gameOver = true;
    status.textContent = `${current} wins!`;
    winLine.forEach(j => cells[j].classList.add('win'));
    score[current.toLowerCase()]++;
    updateScore();
    return;
  }
  if (state.every(c => c)) {
    gameOver = true;
    status.textContent = "It's a draw!";
    score.d++;
    updateScore();
    return;
  }
  current = current === 'X' ? 'O' : 'X';
  status.textContent = `${current}'s turn`;
}

function updateScore() {
  document.getElementById('sx').textContent = score.x;
  document.getElementById('so').textContent = score.o;
  document.getElementById('sd').textContent = score.d;
}

restartBtn.addEventListener('click', init);
init();
</script>
</body>
</html>
