<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; overflow: hidden; }
  canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Input ──
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });
const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
let mouseDown = false;
canvas.addEventListener('mousedown', e => { mouseDown = true; handleClick(); });
canvas.addEventListener('mouseup', () => { mouseDown = false; });

// ── Audio ──
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(freq, duration, type, vol) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxShoot() { playSound(800, 0.05, 'square', 0.06); }
function sfxHit() { playSound(400, 0.08, 'square', 0.05); }
function sfxKill() { playSound(200, 0.15, 'sawtooth', 0.07); }
function sfxPlayerHit() { playSound(120, 0.25, 'square', 0.1); }
function sfxWave() {
  ensureAudio();
  [400, 500, 600, 800].forEach((f, i) => {
    setTimeout(() => playSound(f, 0.12, 'square', 0.06), i * 80);
  });
}

// ── Sprite System ──
const PAL = {
  0: null,
  // Player
  G1: '#22b14c', G2: '#185a2c', G3: '#0e3d1b', SKIN: '#f0c090', GUN: '#888',
  // Enemies
  R1: '#e94560', R2: '#a8324a', R3: '#6b1d30',
  O1: '#ff9933', O2: '#cc6600',
  D1: '#cc2244', D2: '#881133', D3: '#550a22',
};

const PLAYER_SPRITE = [
  [0,0,'G2','G1','G1','G2',0,0],
  [0,'G1','G1','G1','G1','G1','G1',0],
  [0,'G1','G2','SKIN','SKIN','G2','G1',0],
  ['G2','G1','G1','G1','G1','G1','G1','G2'],
  ['G3','G1','G1','G1','G1','G1','G1','G3'],
  [0,'G2','G1','G1','G1','G1','G2',0],
  [0,0,'G3','G2','G2','G3',0,0],
  [0,0,'G2',0,0,'G2',0,0],
];

const ENEMY_BASIC = [
  [0,0,'R2','R2',0,0],
  [0,'R1','R1','R1','R1',0],
  ['R1','R1','R2','R2','R1','R1'],
  ['R2','R1','R1','R1','R1','R2'],
  [0,'R2','R1','R1','R2',0],
  [0,0,'R2','R2',0,0],
];

const ENEMY_FAST = [
  [0,'O1','O1',0],
  ['O1','O2','O2','O1'],
  ['O1','O1','O1','O1'],
  ['O2','O1','O1','O2'],
  [0,'O2','O2',0],
];

const ENEMY_TANK = [
  [0,0,'D2','D1','D1','D2',0,0],
  [0,'D1','D1','D1','D1','D1','D1',0],
  ['D2','D1','D2','D1','D1','D2','D1','D2'],
  ['D1','D1','D1','D1','D1','D1','D1','D1'],
  ['D1','D1','D1','D1','D1','D1','D1','D1'],
  ['D2','D1','D2','D1','D1','D2','D1','D2'],
  [0,'D2','D1','D1','D1','D1','D2',0],
  [0,0,'D3','D2','D2','D3',0,0],
  [0,'D3',0,0,0,0,'D3',0],
  [0,0,'D3',0,0,'D3',0,0],
];

function drawSprite(sprite, x, y, scale, flashWhite) {
  const rows = sprite.length;
  const cols = sprite[0].length;
  const ox = x - (cols * scale) / 2;
  const oy = y - (rows * scale) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const key = sprite[r][c];
      if (key === 0 || key === null) continue;
      ctx.fillStyle = flashWhite ? '#fff' : (PAL[key] || key);
      ctx.fillRect(Math.floor(ox + c * scale), Math.floor(oy + r * scale), scale, scale);
    }
  }
}

// ── Game State ──
let gameState = 'menu';
let score = 0;
let highScore = parseInt(localStorage.getItem('shooterHigh') || '0');
let wave = 1;
let waveIntroTimer = 0;
let enemiesRemaining = 0;
let spawnTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let blinkTimer = 0;

const player = {
  x: 0, y: 0, speed: 180, radius: 12, hp: 5, maxHp: 5, invincible: 0
};

let bullets = [];
let enemies = [];
let particles = [];
let lastShotTime = 0;
const FIRE_RATE = 150; // ms

function resetGame() {
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.hp = 5;
  player.maxHp = 5;
  player.invincible = 0;
  bullets = [];
  enemies = [];
  particles = [];
  score = 0;
  wave = 0;
  shakeTimer = 0;
  nextWave();
}

function nextWave() {
  wave++;
  enemiesRemaining = 5 + (wave - 1) * 3;
  spawnTimer = 1.5;
  gameState = 'waveIntro';
  waveIntroTimer = 2.0;
  if (wave > 1) {
    sfxWave();
    player.hp = Math.min(player.hp + 1, player.maxHp);
  }
}

// ── Spawning ──
function spawnPos() {
  const W = canvas.width, H = canvas.height;
  const edge = Math.floor(Math.random() * 4);
  switch (edge) {
    case 0: return { x: Math.random() * W, y: -30 };
    case 1: return { x: W + 30, y: Math.random() * H };
    case 2: return { x: Math.random() * W, y: H + 30 };
    case 3: return { x: -30, y: Math.random() * H };
  }
}

function spawnEnemy() {
  const p = spawnPos();
  const speedMult = 1 + (wave - 1) * 0.08;
  let type = 0;
  const roll = Math.random();
  if (wave >= 3 && roll < 0.2) type = 2;
  else if (wave >= 2 && roll < 0.4) type = 1;

  const defs = [
    { sprite: ENEMY_BASIC, speed: 60, hp: 1, radius: 10, points: 10, scale: 4 },
    { sprite: ENEMY_FAST, speed: 120, hp: 1, radius: 8, points: 20, scale: 4 },
    { sprite: ENEMY_TANK, speed: 40, hp: 3 + Math.floor(wave / 4), radius: 16, points: 30, scale: 3.5 },
  ];
  const d = defs[type];
  enemies.push({
    x: p.x, y: p.y,
    speed: d.speed * speedMult,
    hp: d.hp, maxHp: d.hp,
    radius: d.radius,
    sprite: d.sprite,
    points: d.points,
    scale: d.scale,
    flashTimer: 0,
    type: type
  });
}

// ── Shooting ──
function shoot() {
  const now = performance.now();
  if (now - lastShotTime < FIRE_RATE) return;
  lastShotTime = now;
  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const gunLen = 18;
  bullets.push({
    x: player.x + Math.cos(angle) * gunLen,
    y: player.y + Math.sin(angle) * gunLen,
    vx: Math.cos(angle) * 500,
    vy: Math.sin(angle) * 500,
    life: 1.5
  });
  // muzzle flash particles
  for (let i = 0; i < 3; i++) {
    const a = angle + (Math.random() - 0.5) * 0.5;
    const sp = 100 + Math.random() * 80;
    particles.push({
      x: player.x + Math.cos(angle) * gunLen,
      y: player.y + Math.sin(angle) * gunLen,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.08 + Math.random() * 0.06,
      color: Math.random() > 0.5 ? '#ffee55' : '#fff',
      size: 2 + Math.random() * 2
    });
  }
  sfxShoot();
}

function handleClick() {
  if (gameState === 'menu') {
    ensureAudio();
    resetGame();
  } else if (gameState === 'gameover') {
    ensureAudio();
    resetGame();
  } else if (gameState === 'playing') {
    shoot();
  }
}

// ── Particles ──
function spawnParticles(x, y, color, count, speedBase) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (speedBase || 60) + Math.random() * 80;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.2 + Math.random() * 0.3,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

// ── Collision ──
function collides(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return dx * dx + dy * dy < (a.radius + b.radius) ** 2;
}

// ── Update ──
function update(dt) {
  blinkTimer += dt;

  if (gameState === 'waveIntro') {
    waveIntroTimer -= dt;
    if (waveIntroTimer <= 0) gameState = 'playing';
    updatePlaying(dt);
    return;
  }
  if (gameState === 'playing') {
    updatePlaying(dt);
  }
}

function updatePlaying(dt) {
  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp'] || keys['w']) dy -= 1;
  if (keys['ArrowDown'] || keys['s']) dy += 1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  player.x += dx * player.speed * dt;
  player.y += dy * player.speed * dt;
  player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

  // Invincibility
  if (player.invincible > 0) player.invincible -= dt;

  // Hold to shoot
  if (mouseDown && gameState === 'playing') shoot();

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
      bullets.splice(i, 1);
    }
  }

  // Enemy spawning
  if (enemiesRemaining > 0) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      enemiesRemaining--;
      spawnTimer = Math.max(0.3, 1.2 - wave * 0.06);
    }
  }

  // Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed * dt;
    e.y += Math.sin(angle) * e.speed * dt;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Bullet-enemy collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      const ddx = b.x - e.x, ddy = b.y - e.y;
      if (ddx * ddx + ddy * ddy < (e.radius + 3) ** 2) {
        e.hp--;
        e.flashTimer = 0.08;
        bullets.splice(j, 1);
        spawnParticles(b.x, b.y, '#ffee55', 4, 40);
        if (e.hp <= 0) {
          score += e.points;
          const colors = ['#e94560', '#ff6644', '#ff9933'];
          spawnParticles(e.x, e.y, colors[e.type], 12, 80);
          enemies.splice(i, 1);
          sfxKill();
        } else {
          sfxHit();
        }
        break;
      }
    }
  }

  // Enemy-player collision
  if (player.invincible <= 0) {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (collides({ x: player.x, y: player.y, radius: player.radius }, e)) {
        player.hp--;
        player.invincible = 1.5;
        shakeTimer = 0.3;
        shakeIntensity = 6;
        spawnParticles(player.x, player.y, '#fff', 8, 100);
        sfxPlayerHit();
        // Knock enemy back
        const a = Math.atan2(e.y - player.y, e.x - player.x);
        e.x += Math.cos(a) * 40;
        e.y += Math.sin(a) * 40;
        if (player.hp <= 0) {
          gameState = 'gameover';
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('shooterHigh', highScore.toString());
          }
          return;
        }
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Screen shake
  if (shakeTimer > 0) shakeTimer -= dt;

  // Wave completion
  if (enemiesRemaining <= 0 && enemies.length === 0 && gameState === 'playing') {
    nextWave();
  }
}

// ── Rendering ──
function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#111119';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  if (gameState === 'menu') {
    renderMenu();
    ctx.restore();
    return;
  }

  // Floor grid
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Bullets
  ctx.fillStyle = '#ffee55';
  for (const b of bullets) {
    ctx.fillRect(Math.floor(b.x - 2), Math.floor(b.y - 2), 4, 4);
  }

  // Enemies
  for (const e of enemies) {
    drawSprite(e.sprite, e.x, e.y, e.scale, e.flashTimer > 0);
    // HP bar for tanks
    if (e.maxHp > 1) {
      const bw = e.radius * 2;
      const bh = 3;
      const bx = e.x - bw / 2;
      const by = e.y - e.radius - 8;
      ctx.fillStyle = '#333';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#e94560';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);
    }
  }

  // Player
  const visible = player.invincible <= 0 || Math.sin(blinkTimer * 20) > 0;
  if (visible) {
    drawSprite(PLAYER_SPRITE, player.x, player.y, 4, false);
    // Gun
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    const gunLen = 20;
    ctx.strokeStyle = PAL.GUN;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(player.x + Math.cos(angle) * 6, player.y + Math.sin(angle) * 6);
    ctx.lineTo(player.x + Math.cos(angle) * gunLen, player.y + Math.sin(angle) * gunLen);
    ctx.stroke();
    // Gun tip
    ctx.fillStyle = '#aaa';
    ctx.fillRect(
      player.x + Math.cos(angle) * gunLen - 2,
      player.y + Math.sin(angle) * gunLen - 2, 4, 4
    );
  }

  // Particles
  for (const p of particles) {
    const alpha = Math.max(0, p.life / 0.4);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x - p.size / 2), Math.floor(p.y - p.size / 2), p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Crosshair
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  const cs = 10;
  ctx.beginPath();
  ctx.moveTo(mouse.x - cs, mouse.y); ctx.lineTo(mouse.x - 4, mouse.y);
  ctx.moveTo(mouse.x + 4, mouse.y); ctx.lineTo(mouse.x + cs, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - cs); ctx.lineTo(mouse.x, mouse.y - 4);
  ctx.moveTo(mouse.x, mouse.y + 4); ctx.lineTo(mouse.x, mouse.y + cs);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.fillRect(mouse.x - 1, mouse.y - 1, 2, 2);

  // HUD
  renderHUD();

  // Wave intro overlay
  if (gameState === 'waveIntro') {
    const alpha = Math.min(1, waveIntroTimer / 1.5);
    ctx.fillStyle = `rgba(0,0,0,${0.5 * alpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold 64px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillText(`WAVE ${wave}`, W / 2, H / 2 - 10);
    ctx.font = '18px monospace';
    ctx.fillStyle = `rgba(200,200,200,${alpha})`;
    ctx.fillText(wave > 1 ? '+1 HP restored' : 'Get ready!', W / 2, H / 2 + 30);
  }

  // Game over overlay
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 60px monospace';
    ctx.fillStyle = '#e94560';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
    ctx.font = '24px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2);
    ctx.fillText(`Wave: ${wave}`, W / 2, H / 2 + 35);
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 75);
    ctx.font = '18px monospace';
    ctx.fillStyle = blinkText() ? '#ccc' : '#555';
    ctx.fillText('CLICK TO RESTART', W / 2, H / 2 + 120);
  }

  ctx.restore();
}

function renderMenu() {
  const W = canvas.width, H = canvas.height;
  ctx.textAlign = 'center';

  // Decorative grid
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Title
  ctx.font = 'bold 56px monospace';
  ctx.fillStyle = '#e94560';
  ctx.fillText('RETRO SHOOTER', W / 2, H / 2 - 100);

  // Subtitle
  ctx.font = '20px monospace';
  ctx.fillStyle = '#00b4d8';
  ctx.fillText('Top-Down Survival', W / 2, H / 2 - 60);

  // Controls
  ctx.font = '16px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('ARROWS / WASD : Move', W / 2, H / 2 + 10);
  ctx.fillText('MOUSE : Aim', W / 2, H / 2 + 35);
  ctx.fillText('CLICK : Shoot (hold for auto-fire)', W / 2, H / 2 + 60);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = '18px monospace';
    ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 100);
  }

  // Start prompt
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = blinkText() ? '#fff' : '#555';
  ctx.fillText('CLICK TO START', W / 2, H / 2 + 150);

  // Crosshair on menu too
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  const cs = 10;
  ctx.beginPath();
  ctx.moveTo(mouse.x - cs, mouse.y); ctx.lineTo(mouse.x - 4, mouse.y);
  ctx.moveTo(mouse.x + 4, mouse.y); ctx.lineTo(mouse.x + cs, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - cs); ctx.lineTo(mouse.x, mouse.y - 4);
  ctx.moveTo(mouse.x, mouse.y + 4); ctx.lineTo(mouse.x, mouse.y + cs);
  ctx.stroke();
}

function renderHUD() {
  const W = canvas.width;
  // Background bar
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, 36);

  ctx.textAlign = 'left';
  ctx.font = 'bold 16px monospace';

  // Score
  ctx.fillStyle = '#fff';
  ctx.fillText(`SCORE: ${score}`, 12, 24);

  // HP hearts
  for (let i = 0; i < player.maxHp; i++) {
    const hx = W / 2 - (player.maxHp * 20) / 2 + i * 20;
    ctx.fillStyle = i < player.hp ? '#e94560' : '#333';
    drawHeart(hx, 12, 7);
  }

  // Wave
  ctx.textAlign = 'right';
  ctx.fillStyle = '#00b4d8';
  ctx.fillText(`WAVE ${wave}`, W - 12, 24);
}

function drawHeart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.5, x - s, y - s * 0.5, x - s, y + s * 0.1);
  ctx.bezierCurveTo(x - s, y + s * 0.6, x, y + s, x, y + s);
  ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.6, x + s, y + s * 0.1);
  ctx.bezierCurveTo(x + s, y - s * 0.5, x, y - s * 0.5, x, y + s * 0.3);
  ctx.fill();
}

function blinkText() {
  return Math.floor(blinkTimer * 2) % 2 === 0;
}

// ── Game Loop ──
let lastTime = 0;
function loop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  update(Math.min(dt, 0.05));
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
