// ════════════════════════════════════════════════════════════
// 3. AUDIO
// ════════════════════════════════════════════════════════════
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(freq, duration, type, vol) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxShoot() { playSound(800, 0.05, 'square', 0.06); }
function sfxShotgun() {
  playSound(300, 0.1, 'sawtooth', 0.08);
  playSound(150, 0.15, 'square', 0.06);
}
function sfxHit() { playSound(400, 0.08, 'square', 0.05); }
function sfxKill() { playSound(200, 0.15, 'sawtooth', 0.07); }
function sfxPlayerHit() { playSound(120, 0.25, 'square', 0.1); }
function sfxPickup() {
  playSound(600, 0.08, 'square', 0.06);
  setTimeout(() => playSound(900, 0.1, 'square', 0.06), 60);
}
function sfxLevelUp() {
  ensureAudio();
  [400, 500, 600, 800].forEach((f, i) => {
    setTimeout(() => playSound(f, 0.12, 'square', 0.06), i * 80);
  });
}

  ensureAudio();
  [150, 130, 110, 90, 80].forEach((f, i) => {
    setTimeout(() => playSound(f, 0.3, 'sawtooth', 0.07), i * 150);
  });
}
function sfxBossDead() {

  [200, 300, 400, 500, 600, 800, 1000].forEach((f, i) => {
    setTimeout(() => playSound(f, 0.2, 'square', 0.06), i * 100);

}

// ════════════════════════════════════════════════════════════
// 4. INPUT
// ════════════════════════════════════════════════════════════
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'Escape') togglePause();
  if (e.key === '2' || e.key === 'q') switchWeapon();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
let mouseDown = false;
canvas.addEventListener('mousedown', e => { mouseDown = true; handleClick(); });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('wheel', e => { switchWeapon(); });

// ════════════════════════════════════════════════════════════
// 5. GAME STATE
// ════════════════════════════════════════════════════════════
let gameState = 'menu'; // menu, levelIntro, playing, levelComplete, bossIntro, boss, victory, gameover, paused
let prevState = 'playing';
let score = 0;
let highScore = parseInt(localStorage.getItem('shooterV2High') || '0');
let level = 1;
let waveInLevel = 0;
let introTimer = 0;
let completeTimer = 0;
let enemiesRemaining = 0;
let spawnTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let blinkTimer = 0;
let gameTime = 0;

const player = {
  x: 0, y: 0, speed: 200, radius: 12, hp: 5, maxHp: 5,
  invincible: 0, animFrame: 0, animTimer: 0, moving: false,
  weapon: 'pistol', shotgunAmmo: 0, speedBoost: 0

let bullets = [];
let enemies = [];
let particles = [];
let pickups = [];
let scorePopups = [];

// Boss state
let boss = null;

// ════════════════════════════════════════════════════════════
// 6. SPRITE RENDERER
// ════════════════════════════════════════════════════════════
function drawSprite(sprite, x, y, scale, flashWhite) {
  const rows = sprite.length;
  const cols = sprite[0].length;
  const ox = x - (cols * scale) / 2;
  const oy = y - (rows * scale) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const key = sprite[r][c];
      if (key === 0 || key === null) continue;
      ctx.fillStyle = flashWhite ? '#fff' : (PAL[key] || key);
      ctx.fillRect(Math.floor(ox + c * scale), Math.floor(oy + r * scale), scale, scale);
    }
  }
}

// ════════════════════════════════════════════════════════════
// 8. GAME FLOW
// ════════════════════════════════════════════════════════════
function resetGame() {
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.hp = 5;
  player.maxHp = 5;
  player.invincible = 0;
  player.weapon = 'pistol';
  player.shotgunAmmo = 0;
  player.speedBoost = 0;
  bullets = [];
  enemies = [];
  particles = [];
  pickups = [];
  scorePopups = [];
  boss = null;
  score = 0;
  level = 1;
  waveInLevel = 0;
  gameTime = 0;
  startLevelIntro();
}

function startLevelIntro() {
  gameState = 'levelIntro';
  introTimer = 2.0;
  waveInLevel = 0;
  enemies = [];
  bullets = [];
  pickups = [];
  boss = null;
  if (level > 1) sfxLevelUp();
}

function startNextWave() {
  waveInLevel++;
  const lvl = LEVELS[level - 1];
  // Check if this is boss level and all regular waves done
  if (level === 5 && waveInLevel > lvl.waves.length) {
    startBossIntro();
    return;
  }
  if (waveInLevel > lvl.waves.length) {
    // Level complete
    levelComplete();
    return;
  }
  const wave = lvl.waves[waveInLevel - 1];
  enemiesRemaining = wave.total;
  spawnTimer = 1.0;
  gameState = 'playing';
}

function levelComplete() {
  gameState = 'levelComplete';
  completeTimer = 2.5;
  player.hp = Math.min(player.hp + 1, player.maxHp);
  sfxLevelUp();
}

function advanceLevel() {
  level++;
  if (level > 5) {
    victory();
    return;
  }
  startLevelIntro();
}

function startBossIntro() {
  gameState = 'bossIntro';
  introTimer = 3.0;
  sfxBossIntro();
  enemies = [];
  bullets = [];
}

function spawnBoss() {
  boss = {
    x: canvas.width / 2,
    y: -60,
    hp: 30,
    maxHp: 30,
    radius: 30,
    speed: 100,
    phase: 'enter', // enter, charge, pause, spawn
    phaseTimer: 0,
    chargeTarget: null,
    flashTimer: 0,
    spawnCount: 0,
  };
  gameState = 'boss';
}

function victory() {
  gameState = 'victory';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('shooterV2High', highScore.toString());
  }
  sfxVictory();
}

function gameOver() {
  gameState = 'gameover';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('shooterV2High', highScore.toString());
  }
}

function togglePause() {
  if (gameState === 'paused') {
    gameState = prevState;
  } else if (gameState === 'playing' || gameState === 'boss') {
    prevState = gameState;
    gameState = 'paused';
  }
}

function switchWeapon() {
  if (player.shotgunAmmo > 0) {
    player.weapon = player.weapon === 'pistol' ? 'shotgun' : 'pistol';
  }
}

function handleClick() {
  if (gameState === 'menu') {
    ensureAudio();
    resetGame();
  } else if (gameState === 'gameover' || gameState === 'victory') {
    ensureAudio();
    resetGame();
  } else if (gameState === 'playing' || gameState === 'boss') {
    shoot();
  }
}

// ════════════════════════════════════════════════════════════
// 9. SPAWNING
// ════════════════════════════════════════════════════════════
function spawnPos() {
  const W = canvas.width, H = canvas.height;
  const edge = Math.floor(Math.random() * 4);
  switch (edge) {
    case 0: return { x: Math.random() * W, y: -30 };
    case 1: return { x: W + 30, y: Math.random() * H };
    case 2: return { x: Math.random() * W, y: H + 30 };
    case 3: return { x: -30, y: Math.random() * H };
  }
}

function spawnEnemy(forceType) {
  const p = spawnPos();
  const speedMult = 1 + (level - 1) * 0.1;

  let type = 0;
  if (forceType !== undefined) {
    type = forceType;
  } else {
    const lvl = LEVELS[level - 1];
    const wave = lvl.waves[waveInLevel - 1];
    const roll = Math.random();
    if (roll < wave.types[2]) type = 2;
    else if (roll < wave.types[2] + wave.types[1]) type = 1;
  }

  const defs = [
    { sprite: ENEMY_BASIC, speed: 65, hp: 1, radius: 10, points: 10, scale: 4 },
    { sprite: ENEMY_FAST, speed: 130, hp: 1, radius: 8, points: 20, scale: 4 },
    { sprite: ENEMY_TANK, speed: 42, hp: 3, radius: 16, points: 30, scale: 3.5 },
  ];
  const d = defs[type];
  enemies.push({
    x: p.x, y: p.y,
    speed: d.speed * speedMult,
    hp: d.hp, maxHp: d.hp,
    radius: d.radius,
    sprite: d.sprite,
    points: d.points,
    scale: d.scale,
    flashTimer: 0,
    type: type,
    wobbleOffset: Math.random() * Math.PI * 2,
  });
}

// ════════════════════════════════════════════════════════════
// 10. SHOOTING
// ════════════════════════════════════════════════════════════
function shoot() {
  const now = performance.now();
  const rate = player.weapon === 'shotgun' ? SHOTGUN_RATE : PISTOL_RATE;
  if (now - lastShotTime < rate) return;
  lastShotTime = now;

  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const gunLen = 20;
  const bx = player.x + Math.cos(angle) * gunLen;
  const by = player.y + Math.sin(angle) * gunLen;

  if (player.weapon === 'shotgun' && player.shotgunAmmo > 0) {
    // Shotgun: 5 pellets in spread
    for (let i = 0; i < 5; i++) {
      const spread = (i - 2) * 0.12 + (Math.random() - 0.5) * 0.08;
      const a = angle + spread;
      const spd = 450 + Math.random() * 80;
      bullets.push({
        x: bx, y: by,
        vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
        life: 0.6
      });
    }
    player.shotgunAmmo--;
    if (player.shotgunAmmo <= 0) player.weapon = 'pistol';
    sfxShotgun();
    // Big muzzle flash
    for (let i = 0; i < 8; i++) {
      const a = angle + (Math.random() - 0.5) * 0.8;
      const sp = 120 + Math.random() * 100;
      particles.push({
        x: bx, y: by,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 0.1 + Math.random() * 0.08,
        color: Math.random() > 0.5 ? '#ffee55' : '#ff8833',
        size: 3 + Math.random() * 3
      });
    }
  } else {
    // Pistol
    bullets.push({
      x: bx, y: by,
      vx: Math.cos(angle) * 500, vy: Math.sin(angle) * 500,
      life: 1.5
    });
    sfxShoot();
    // Muzzle flash
    for (let i = 0; i < 3; i++) {
      const a = angle + (Math.random() - 0.5) * 0.5;
      const sp = 100 + Math.random() * 80;
      particles.push({
        x: bx, y: by,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 0.08 + Math.random() * 0.06,
        color: Math.random() > 0.5 ? '#ffee55' : '#fff',
        size: 2 + Math.random() * 2
      });
    }
  }
}

// ════════════════════════════════════════════════════════════
// 11. PICKUPS
// ════════════════════════════════════════════════════════════
function tryDropPickup(x, y) {
  const roll = Math.random();
  if (roll < 0.08) {
    // Heart drop
    pickups.push({
      x, y, type: 'heart', radius: 10, sprite: PICKUP_HEART, scale: 3, life: 8, bobOffset: Math.random() * Math.PI * 2
    });
  } else if (roll < 0.18) {
    // Shotgun drop
    pickups.push({
      x, y, type: 'shotgun', radius: 12, sprite: PICKUP_SHOTGUN, scale: 3, life: 8, bobOffset: Math.random() * Math.PI * 2
    });
  }
}

// ════════════════════════════════════════════════════════════
// 12. PARTICLES & SCORE POPUPS
// ════════════════════════════════════════════════════════════
function spawnParticles(x, y, color, count, speedBase) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (speedBase || 60) + Math.random() * 80;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.2 + Math.random() * 0.3,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

function addScorePopup(x, y, text, color) {
  scorePopups.push({
    x, y, text, color: color || '#fff',
    life: 0.8, vy: -60
  });
}

// ════════════════════════════════════════════════════════════
// 13. COLLISION
// ════════════════════════════════════════════════════════════
function collides(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return dx * dx + dy * dy < (a.radius + b.radius) ** 2;
}

function damagePlayer() {
  if (player.invincible > 0) return;
  player.hp--;
  player.invincible = 1.5;
  shakeTimer = 0.3;
  shakeIntensity = 6;
  spawnParticles(player.x, player.y, '#fff', 8, 100);
  sfxPlayerHit();
  if (player.hp <= 0) {
    gameOver();
  }
}

// ════════════════════════════════════════════════════════════
// 14. UPDATE
// ════════════════════════════════════════════════════════════
function update(dt) {
  blinkTimer += dt;
  gameTime += dt;

  if (gameState === 'menu' || gameState === 'gameover' || gameState === 'victory') return;
  if (gameState === 'paused') return;

  if (gameState === 'levelIntro') {
    introTimer -= dt;
    if (introTimer <= 0) {
      startNextWave();
    }
    return;
  }

  if (gameState === 'levelComplete') {
    completeTimer -= dt;
    if (completeTimer <= 0) {
      advanceLevel();
    }
    return;
  }

  if (gameState === 'bossIntro') {
    introTimer -= dt;
    if (introTimer <= 0) {
      spawnBoss();
    }
    return;
  }

  // Playing or Boss state
  updatePlaying(dt);

  if (gameState === 'boss') {
    updateBoss(dt);
  }
}

function updatePlaying(dt) {
  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp'] || keys['w']) dy -= 1;
  if (keys['ArrowDown'] || keys['s']) dy += 1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }

  player.moving = dx !== 0 || dy !== 0;
  const spd = player.speedBoost > 0 ? player.speed * 1.5 : player.speed;
  player.x += dx * spd * dt;
  player.y += dy * spd * dt;
  player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

  // Walk animation
  if (player.moving) {
    player.animTimer += dt;
    if (player.animTimer > 0.12) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % PLAYER_FRAMES.length;
    }
  } else {
    player.animFrame = 0;
    player.animTimer = 0;
  }

  // Timers
  if (player.invincible > 0) player.invincible -= dt;
  if (player.speedBoost > 0) player.speedBoost -= dt;

  // Hold to shoot
  if (mouseDown && (gameState === 'playing' || gameState === 'boss')) shoot();

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
      bullets.splice(i, 1);
    }
  }

  // Enemy spawning (only in 'playing' state, not boss)
  if (gameState === 'playing' && enemiesRemaining > 0) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      enemiesRemaining--;
      const lvl = LEVELS[level - 1];
      const wave = lvl.waves[waveInLevel - 1];
      spawnTimer = wave ? wave.spawnRate : 0.8;
    }
  }

  // Enemies AI
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const angle = Math.atan2(player.y - e.y, player.x - e.x);

    if (e.type === 0) {
      // Basic: chase with wobble
      const wobble = Math.sin(gameTime * 3 + e.wobbleOffset) * 0.3;
      e.x += Math.cos(angle + wobble) * e.speed * dt;
      e.y += Math.sin(angle + wobble) * e.speed * dt;
    } else if (e.type === 1) {
      // Fast: zigzag sine wave
      const zigzag = Math.sin(gameTime * 6 + e.wobbleOffset) * 1.2;
      const perpAngle = angle + Math.PI / 2;
      e.x += (Math.cos(angle) + Math.cos(perpAngle) * zigzag * 0.3) * e.speed * dt;
      e.y += (Math.sin(angle) + Math.sin(perpAngle) * zigzag * 0.3) * e.speed * dt;
    } else if (e.type === 2) {
      // Tank: slow chase, charges when close
      const dist = Math.hypot(player.x - e.x, player.y - e.y);
      const chargeSpeed = dist < 150 ? e.speed * 2.5 : e.speed;
      e.x += Math.cos(angle) * chargeSpeed * dt;
      e.y += Math.sin(angle) * chargeSpeed * dt;
    }

    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Bullet-enemy collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      const ddx = b.x - e.x, ddy = b.y - e.y;
      if (ddx * ddx + ddy * ddy < (e.radius + 4) ** 2) {
        e.hp--;
        e.flashTimer = 0.08;
        bullets.splice(j, 1);
        spawnParticles(b.x, b.y, '#ffee55', 4, 40);
        if (e.hp <= 0) {
          score += e.points;
          const colors = ['#e94560', '#ff9933', '#cc2244'];
          spawnParticles(e.x, e.y, colors[e.type], 12, 80);
          addScorePopup(e.x, e.y - 15, `+${e.points}`, colors[e.type]);
          tryDropPickup(e.x, e.y);
          enemies.splice(i, 1);
          sfxKill();
        } else {
          sfxHit();
        }
        break;
      }
    }
  }

  // Enemy-player collision
  if (player.invincible <= 0) {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (collides({ x: player.x, y: player.y, radius: player.radius }, e)) {
        damagePlayer();
        // Knock enemy back
        const a = Math.atan2(e.y - player.y, e.x - player.x);
        e.x += Math.cos(a) * 40;
        e.y += Math.sin(a) * 40;
        if (gameState === 'gameover') return;
      }
    }
  }

  // Bullet-boss collision
  if (boss && boss.hp > 0) {
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      const ddx = b.x - boss.x, ddy = b.y - boss.y;
      if (ddx * ddx + ddy * ddy < (boss.radius + 4) ** 2) {
        boss.hp--;
        boss.flashTimer = 0.06;
        bullets.splice(j, 1);
        spawnParticles(b.x, b.y, '#cc66ff', 3, 40);
        if (boss.hp <= 0) {
          // Boss dead!
          score += 200;
          addScorePopup(boss.x, boss.y - 30, '+200', '#ff66ff');
          spawnParticles(boss.x, boss.y, '#9933ff', 30, 120);
          spawnParticles(boss.x, boss.y, '#ff3366', 20, 100);
          spawnParticles(boss.x, boss.y, '#fff', 15, 80);
          shakeTimer = 0.8;
          shakeIntensity = 12;
          sfxBossDead();
          // Clear remaining enemies
          for (const en of enemies) {
            spawnParticles(en.x, en.y, '#ff6644', 6, 60);
          }
          enemies = [];
          boss = null;
          // Short delay then victory
          setTimeout(() => { if (gameState === 'boss') victory(); }, 1500);
        } else {
          sfxHit();
        }
        break;
      }
    }
  }

  // Boss-player collision
  if (boss && boss.hp > 0 && player.invincible <= 0) {
    if (collides({ x: player.x, y: player.y, radius: player.radius },
                 { x: boss.x, y: boss.y, radius: boss.radius })) {
      damagePlayer();
      if (gameState === 'gameover') return;
    }
  }

  // Pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.life -= dt;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }
    const ddx = player.x - p.x, ddy = player.y - p.y;
    if (ddx * ddx + ddy * ddy < (player.radius + p.radius) ** 2) {
      if (p.type === 'heart') {
        if (player.hp < player.maxHp) {
          player.hp++;
          addScorePopup(p.x, p.y - 10, '+HP', '#ff4477');
        } else {
          score += 50;
          addScorePopup(p.x, p.y - 10, '+50', '#ff4477');
        }
      } else if (p.type === 'shotgun') {
        player.shotgunAmmo += 15;
        player.weapon = 'shotgun';
        addScorePopup(p.x, p.y - 10, 'SHOTGUN!', '#ffaa22');
      }
      sfxPickup();
      spawnParticles(p.x, p.y, '#fff', 6, 40);
      pickups.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Score popups
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const s = scorePopups[i];
    s.y += s.vy * dt;
    s.life -= dt;
    if (s.life <= 0) scorePopups.splice(i, 1);
  }

  // Screen shake
  if (shakeTimer > 0) shakeTimer -= dt;

  // Wave completion check (playing state only)
  if (gameState === 'playing' && enemiesRemaining <= 0 && enemies.length === 0) {
    startNextWave();
  }
}

// ════════════════════════════════════════════════════════════
// 15. BOSS AI
// ════════════════════════════════════════════════════════════
function updateBoss(dt) {
  if (!boss || boss.hp <= 0) return;

  if (boss.flashTimer > 0) boss.flashTimer -= dt;

  switch (boss.phase) {
    case 'enter':
      // Slide into screen
      boss.y += 80 * dt;
      if (boss.y >= 100) {
        boss.y = 100;
        boss.phase = 'charge';
        boss.phaseTimer = 0.5;
        boss.chargeTarget = { x: player.x, y: player.y };
      }
      break;

    case 'charge':
      boss.phaseTimer -= dt;
      if (boss.phaseTimer > 0) {
        // Windup
      } else {
        // Charge toward stored target
        const angle = Math.atan2(boss.chargeTarget.y - boss.y, boss.chargeTarget.x - boss.x);
        boss.x += Math.cos(angle) * 280 * dt;
        boss.y += Math.sin(angle) * 280 * dt;
        const dist = Math.hypot(boss.chargeTarget.x - boss.x, boss.chargeTarget.y - boss.y);
        if (dist < 30) {
          shakeTimer = 0.15;
          shakeIntensity = 4;
          boss.phase = 'pause';
          boss.phaseTimer = 1.5;
        }
      }
      // Keep boss on screen
      boss.x = Math.max(40, Math.min(canvas.width - 40, boss.x));
      boss.y = Math.max(40, Math.min(canvas.height - 40, boss.y));
      break;

    case 'pause':
      boss.phaseTimer -= dt;
      // Drift slowly toward center
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const toCenter = Math.atan2(cy - boss.y, cx - boss.x);
      boss.x += Math.cos(toCenter) * 30 * dt;
      boss.y += Math.sin(toCenter) * 30 * dt;
      if (boss.phaseTimer <= 0) {
        boss.phase = 'spawn';
        boss.phaseTimer = 0.8;
        boss.spawnCount = 3;
      }
      break;

    case 'spawn':
      boss.phaseTimer -= dt;
      if (boss.spawnCount > 0 && boss.phaseTimer <= boss.spawnCount * 0.25) {
        // Spawn a basic enemy from boss position
        const a = Math.random() * Math.PI * 2;
        enemies.push({
          x: boss.x + Math.cos(a) * 40,
          y: boss.y + Math.sin(a) * 40,
          speed: 70, hp: 1, maxHp: 1, radius: 10,
          sprite: ENEMY_BASIC, points: 10, scale: 4,
          flashTimer: 0, type: 0, wobbleOffset: Math.random() * Math.PI * 2,
        });
        boss.spawnCount--;
        spawnParticles(boss.x, boss.y, '#9933ff', 5, 60);
      }
      if (boss.phaseTimer <= 0) {
        boss.phase = 'charge';
        boss.phaseTimer = 0.5;
        boss.chargeTarget = { x: player.x, y: player.y };
      }
      break;
  }
}

// ════════════════════════════════════════════════════════════
// 16. RENDERING
// ════════════════════════════════════════════════════════════
function render() {
  ctx.save();
  const W = canvas.width, H = canvas.height;

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  // Background
  ctx.fillStyle = '#111119';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  if (gameState === 'menu') {
    renderMenu();
    ctx.restore();
    return;
  }

  // Floor grid
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Pickups
  for (const p of pickups) {
    const bob = Math.sin(gameTime * 4 + p.bobOffset) * 3;
    const alpha = p.life < 2 ? (0.3 + 0.7 * Math.abs(Math.sin(gameTime * 8))) : 1;
    ctx.globalAlpha = alpha;
    drawSprite(p.sprite, p.x, p.y + bob, p.scale, false);
    ctx.globalAlpha = 1;
  }

  // Bullets
  ctx.fillStyle = '#ffee55';
  for (const b of bullets) {
    ctx.fillRect(Math.floor(b.x - 2), Math.floor(b.y - 2), 4, 4);
  }

  // Enemies
  for (const e of enemies) {
    drawSprite(e.sprite, e.x, e.y, e.scale, e.flashTimer > 0);
    // HP bar for tanks
    if (e.maxHp > 1) {
      const bw = e.radius * 2;
      const bh = 3;
      const bx = e.x - bw / 2;
      const by = e.y - e.radius - 8;
      ctx.fillStyle = '#333';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#e94560';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);
    }
  }

  // Boss
  if (boss && boss.hp > 0) {
    drawSprite(BOSS_SPRITE, boss.x, boss.y, 4, boss.flashTimer > 0);

    // Boss HP bar
    const barW = 200;
    const barH = 10;
    const barX = W / 2 - barW / 2;
    const barY = H - 50;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    // Color shifts as HP drops
    const hpPct = boss.hp / boss.maxHp;
    ctx.fillStyle = hpPct > 0.5 ? '#9933ff' : hpPct > 0.25 ? '#ff6633' : '#ff2222';
    ctx.fillRect(barX, barY, barW * hpPct, barH);
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText('BOSS', W / 2, barY - 6);
  }

  // Player
  const visible = player.invincible <= 0 || Math.sin(blinkTimer * 20) > 0;
  if (visible && gameState !== 'gameover') {
    const frame = PLAYER_FRAMES[player.animFrame];
    drawSprite(frame, player.x, player.y, 4, false);
    // Speed boost glow
    if (player.speedBoost > 0) {
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#00ffff';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    // Gun
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    const gunLen = 20;
    ctx.strokeStyle = player.weapon === 'shotgun' ? '#aa8844' : PAL.GUN;
    ctx.lineWidth = player.weapon === 'shotgun' ? 4 : 3;
    ctx.beginPath();
    ctx.moveTo(player.x + Math.cos(angle) * 6, player.y + Math.sin(angle) * 6);
    ctx.lineTo(player.x + Math.cos(angle) * gunLen, player.y + Math.sin(angle) * gunLen);
    ctx.stroke();
    ctx.fillStyle = player.weapon === 'shotgun' ? '#ccaa55' : '#aaa';
    ctx.fillRect(
      player.x + Math.cos(angle) * gunLen - 2,
      player.y + Math.sin(angle) * gunLen - 2, 4, 4
    );
  }

  // Particles
  for (const p of particles) {
    const alpha = Math.max(0, p.life / 0.4);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x - p.size / 2), Math.floor(p.y - p.size / 2), p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Score popups
  for (const s of scorePopups) {
    const alpha = Math.max(0, s.life / 0.8);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = s.color;
    ctx.fillText(s.text, s.x, s.y);
  }
  ctx.globalAlpha = 1;

  // Crosshair
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  const cs = 10;
  ctx.beginPath();
  ctx.moveTo(mouse.x - cs, mouse.y); ctx.lineTo(mouse.x - 4, mouse.y);
  ctx.moveTo(mouse.x + 4, mouse.y); ctx.lineTo(mouse.x + cs, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - cs); ctx.lineTo(mouse.x, mouse.y - 4);
  ctx.moveTo(mouse.x, mouse.y + 4); ctx.lineTo(mouse.x, mouse.y + cs);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.fillRect(mouse.x - 1, mouse.y - 1, 2, 2);

  // HUD
  renderHUD();

  // Overlays
  if (gameState === 'levelIntro') renderLevelIntro();
  if (gameState === 'levelComplete') renderLevelComplete();
  if (gameState === 'bossIntro') renderBossIntro();
  if (gameState === 'gameover') renderGameOver();
  if (gameState === 'victory') renderVictory();
  if (gameState === 'paused') renderPause();

  ctx.restore();
}

// ════════════════════════════════════════════════════════════
// 17. HUD
// ════════════════════════════════════════════════════════════
function drawHeart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.5, x - s, y - s * 0.5, x - s, y + s * 0.1);
  ctx.bezierCurveTo(x - s, y + s * 0.6, x, y + s, x, y + s);
  ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.6, x + s, y + s * 0.1);
  ctx.bezierCurveTo(x + s, y - s * 0.5, x, y - s * 0.5, x, y + s * 0.3);
  ctx.fill();
}

function renderHUD() {
  const W = canvas.width;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, 40);

  ctx.textAlign = 'left';
  ctx.font = 'bold 16px monospace';

  // Score
  ctx.fillStyle = '#fff';
  ctx.fillText(`SCORE: ${score}`, 12, 26);

  // HP hearts
  for (let i = 0; i < player.maxHp; i++) {
    const hx = W / 2 - (player.maxHp * 20) / 2 + i * 20;
    ctx.fillStyle = i < player.hp ? '#e94560' : '#333';
    drawHeart(hx, 14, 7);
  }

  // Level/Wave info
  ctx.textAlign = 'right';
  ctx.fillStyle = '#00b4d8';
  if (gameState === 'boss' || gameState === 'bossIntro') {
    ctx.fillText('BOSS FIGHT', W - 12, 26);
  } else {
    const lvl = LEVELS[level - 1];
    const totalWaves = lvl ? lvl.waves.length : 3;
    ctx.fillText(`LVL ${level} - WAVE ${Math.min(waveInLevel, totalWaves)}/${totalWaves}`, W - 12, 26);
  }

  // Weapon/Ammo
  if (player.shotgunAmmo > 0) {
    ctx.textAlign = 'left';
    ctx.font = '13px monospace';
    const weaponText = player.weapon === 'shotgun'
      ? `[SHOTGUN: ${player.shotgunAmmo}]`
      : `[PISTOL] SG:${player.shotgunAmmo}`;
    ctx.fillStyle = player.weapon === 'shotgun' ? '#ffaa22' : '#888';
    ctx.fillText(weaponText, 12, 56);
    ctx.fillStyle = '#555';
    ctx.fillText('Q/2/Scroll to switch', 12, 72);
  }
}

// ════════════════════════════════════════════════════════════
// 18. SCREEN RENDERS
// ════════════════════════════════════════════════════════════
function blinkText() {
  return Math.floor(blinkTimer * 2) % 2 === 0;
}

function renderMenu() {
  const W = canvas.width, H = canvas.height;
  ctx.textAlign = 'center';

  // Grid
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Animated background particles on menu
  const t = blinkTimer;
  for (let i = 0; i < 8; i++) {
    const px = W / 2 + Math.cos(t * 0.5 + i * 0.8) * 200;
    const py = H / 2 + Math.sin(t * 0.3 + i * 1.1) * 150;
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = ['#e94560', '#ff9933', '#9933ff', '#00b4d8'][i % 4];
    ctx.fillRect(px - 4, py - 4, 8, 8);
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.font = 'bold 56px monospace';
  ctx.fillStyle = '#e94560';
  ctx.fillText('RETRO SHOOTER', W / 2, H / 2 - 120);
  ctx.font = 'bold 24px monospace';
  ctx.fillStyle = '#9933ff';
  ctx.fillText('v2', W / 2 + 230, H / 2 - 120);

  // Subtitle
  ctx.font = '20px monospace';
  ctx.fillStyle = '#00b4d8';
  ctx.fillText('5 Levels \u2022 3 Enemy Types \u2022 Boss Fight', W / 2, H / 2 - 75);

  // Controls
  ctx.font = '15px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('WASD / ARROWS : Move', W / 2, H / 2 - 20);
  ctx.fillText('MOUSE : Aim  |  CLICK : Shoot (hold to auto-fire)', W / 2, H / 2 + 5);
  ctx.fillText('Q / 2 / SCROLL : Switch Weapon  |  ESC : Pause', W / 2, H / 2 + 30);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = '18px monospace';
    ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 75);
  }

  // Start
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = blinkText() ? '#fff' : '#555';
  ctx.fillText('CLICK TO START', W / 2, H / 2 + 130);

  // Crosshair
  renderCrosshair();
}

function renderLevelIntro() {
  const W = canvas.width, H = canvas.height;
  const alpha = Math.min(1, introTimer / 1.5);
  ctx.fillStyle = `rgba(0,0,0,${0.6 * alpha})`;
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.fillText(`LEVEL ${level}`, W / 2, H / 2 - 20);
  ctx.font = '20px monospace';
  ctx.fillStyle = `rgba(200,200,200,${alpha})`;
  const subtitle = level === 5 ? 'Final Stage...' : level > 1 ? '+1 HP restored' : 'Get ready!';
  ctx.fillText(subtitle, W / 2, H / 2 + 25);
}

function renderLevelComplete() {
  const W = canvas.width, H = canvas.height;
  const alpha = Math.min(1, completeTimer / 2);
  ctx.fillStyle = `rgba(0,0,0,${0.5 * alpha})`;
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = `rgba(0,180,216,${alpha})`;
  ctx.fillText(`LEVEL ${level} COMPLETE`, W / 2, H / 2 - 10);
  ctx.font = '20px monospace';
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 30);
}

function renderBossIntro() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  // Dramatic flicker
  const flicker = Math.sin(blinkTimer * 10) > 0;
  ctx.font = 'bold 56px monospace';
  ctx.fillStyle = flicker ? '#ff3366' : '#9933ff';
  ctx.fillText('WARNING', W / 2, H / 2 - 40);
  ctx.font = 'bold 32px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('BOSS APPROACHING', W / 2, H / 2 + 15);
}

function renderGameOver() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 60px monospace';
  ctx.fillStyle = '#e94560';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
  ctx.font = '24px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Score: ${score}`, W / 2, H / 2);
  ctx.fillText(`Level ${level} - Wave ${waveInLevel}`, W / 2, H / 2 + 35);
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 75);
  ctx.font = '18px monospace';
  ctx.fillStyle = blinkText() ? '#ccc' : '#555';
  ctx.fillText('CLICK TO RESTART', W / 2, H / 2 + 120);
}

function renderVictory() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  // Celebration particles
  const t = blinkTimer;
  for (let i = 0; i < 12; i++) {
    const px = W / 2 + Math.cos(t + i * 0.52) * (120 + Math.sin(t * 2 + i) * 40);
    const py = H / 2 - 20 + Math.sin(t * 0.8 + i * 0.7) * 80;
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = ['#ffcc00', '#ff3366', '#00b4d8', '#9933ff', '#22b14c'][i % 5];
    ctx.fillRect(px - 3, py - 3, 6, 6);
  }
  ctx.globalAlpha = 1;

  ctx.font = 'bold 56px monospace';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('VICTORY!', W / 2, H / 2 - 60);
  ctx.font = '22px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('You defeated the boss!', W / 2, H / 2 - 15);
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 30);
  ctx.fillStyle = '#ffcc00';
  ctx.font = '20px monospace';
  ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 65);
  ctx.font = '18px monospace';
  ctx.fillStyle = blinkText() ? '#ccc' : '#555';
  ctx.fillText('CLICK TO PLAY AGAIN', W / 2, H / 2 + 110);
}

function renderPause() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('PAUSED', W / 2, H / 2 - 10);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('Press ESC to resume', W / 2, H / 2 + 30);
}

function renderCrosshair() {
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  const cs = 10;
  ctx.beginPath();
  ctx.moveTo(mouse.x - cs, mouse.y); ctx.lineTo(mouse.x - 4, mouse.y);
  ctx.moveTo(mouse.x + 4, mouse.y); ctx.lineTo(mouse.x + cs, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - cs); ctx.lineTo(mouse.x, mouse.y - 4);
  ctx.moveTo(mouse.x, mouse.y + 4); ctx.lineTo(mouse.x, mouse.y + cs);
  ctx.stroke();
}

// ════════════════════════════════════════════════════════════
// 19. GAME LOOP
// ════════════════════════════════════════════════════════════
let lastTime = 0;
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
